name: Weekly Optimize

on:
  schedule:
    - cron: "0 5 * * 1"   # Mondays 05:00 UTC — runs after daily-predict.yml (04:00 UTC)
  workflow_dispatch:        # manual trigger for operator verification runs

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # checkout only; no push
      id-token: write   # reserved for future OIDC workload-identity migration

    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # matches daily-predict.yml

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa.json

      - name: Authenticate gcloud CLI
        run: gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json

      - name: Run weekly optimizer
        run: python scripts/weekly_optimize.py

      - name: Cleanup SA key
        if: always()   # runs even if earlier steps fail; prevents key leakage
        run: rm -f /tmp/gcp-sa.json
